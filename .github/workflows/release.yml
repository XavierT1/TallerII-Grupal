name: Build and Release

# Se activa cuando creas un tag que empieza con 'v', por ejemplo: v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    permissions:
      contents: write # Necesario para crear la Release

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Dar permisos de ejecución al script de gradle (necesario en algunos entornos)
      - name: Dar permisos a gradlew
        run: chmod +x gradlew
        shell: bash

      # Ejecutar la tarea para construir el JAR con dependencias (Fat JAR)
      - name: Construir el Super JAR
        run: ./gradlew shadowJar

      # Ejecutar la tarea de Launch4j para crear el archivo .exe
      - name: Construir el ejecutable EXE
        run: ./gradlew createExe

      # Tomar los archivos generados y publicarlos en GitHub Releases
      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v1
        with:
          # Adjuntamos el JAR y el EXE
          files: |
            build/libs/*.jar
            build/launch4j/*.exe
          generate_release_notes: true # Genera las notas de la versión automáticamente usando los commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
